<head>

<body>
    <section id="button-section">        
        <div>
            <ul id="" class="list-group">
                <h5>Productos - Precio</h5>
                <!--Show products here-->
                <% productList.forEach( p => { %>
                    <div class="product-list">
                        <li class="list-group-item"><p class="fs-1"><%= p.name %></p></li>
                        <div class="float-left price-tag"><p class="fs-
                            4">$ <%= p.price %></p></div>
                    </div>                    
                <% }) %>
            </ul>
        </div>
    </section>
</body>
